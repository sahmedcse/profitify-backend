services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: profitify-db
    environment:
      POSTGRES_USER: profitify
      POSTGRES_PASSWORD: profitify
      POSTGRES_DB: profitify
    ports:
      - "5432:5432"
    volumes:
      - profitify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profitify -d profitify"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: build/migrate.Dockerfile
    container_name: profitify-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command: ["-dir", "/migrations", "postgres", "postgres://profitify:profitify@db:5432/profitify?sslmode=disable", "up"]

  lambda-fetch-tickers:
    build:
      context: .
      dockerfile: build/lambda-fetch-tickers.Dockerfile
    container_name: profitify-lambda-fetch-tickers
    profiles: ["lambda"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://profitify:profitify@db:5432/profitify?sslmode=disable
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      APP_ENV: development
    ports:
      - "9000:8080"

  lambda-fetch-technicals:
    build:
      context: .
      dockerfile: build/lambda-fetch-technicals.Dockerfile
    container_name: profitify-lambda-fetch-technicals
    profiles: ["lambda"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://profitify:profitify@db:5432/profitify?sslmode=disable
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      APP_ENV: development
    ports:
      - "9002:8080"

  lambda-ingest-ohlcv:
    build:
      context: .
      dockerfile: build/lambda-ingest-ohlcv.Dockerfile
    container_name: profitify-lambda-ingest-ohlcv
    profiles: ["lambda"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://profitify:profitify@db:5432/profitify?sslmode=disable
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      APP_ENV: development
    ports:
      - "9001:8080"

volumes:
  profitify-db-data:
